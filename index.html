<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>투박한 게임 메신저</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>💬 웹 메신저</h1>
  <hr>

  <!-- 1. 로그인 폼 -->
  <fieldset id="login-sec" style="width: 320px;">
    <legend>접속하기</legend>
    <p>ID: <input type="text" id="login-id"></p>
    <p>PW: <input type="password" id="login-pw"></p>
    <button type="button" onclick="login()">로그인</button>
  </fieldset>

  <!-- 2. 메인 메신저 영역 -->
  <div id="chat-sec" style="display:none;">
    
    <!-- 📌 상단 고정 공지사항 -->
    <table border="1" width="550" cellpadding="5">
      <tr>
        <td bgcolor="#ffeb3b">
          <b>📌 [공지]</b> <span id="notice-text">공지 불러오는 중...</span>
        </td>
      </tr>
    </table>
    <br>

    <!-- 접속자 및 채널 선택 -->
    <b>접속자:</b> <span id="my-name"></span> | 
    <b>채널:</b> 
    <select id="channel-select">
      <option value="global">[전체]</option>
      <option value="server1">[서버1]</option>
      <option value="server2">[서버2]</option>
      <option value="server3">[서버3]</option>
    </select> | 
    <button type="button" onclick="location.reload()">로그아웃</button>
    <br><br>

    <!-- 📌 이미지 출력이 가능한 투박한 채팅 상자 -->
    <div id="chat-box" style="width: 550px; height: 350px; border: 2px solid black; overflow-y: scroll; padding: 5px; font-family: monospace; white-space: pre-wrap; word-break: break-all;"></div>
    <br>

    <!-- 입력창 -->
    <input type="text" id="msg-input" size="55" placeholder="메시지, /w [닉네임] [할말], 또는 /공지 [할말]" onkeydown="if(event.key==='Enter') sendMsg()">
    <button type="button" onclick="sendMsg()">전송</button>

  </div>

  <script>
    const SUPABASE_URL = 'https://jxqtwzdevpgnhljgsnfz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4cXR3emRldnBnbmhsamdzbmZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NjM5MDgsImV4cCI6MjEwMDEzOTkwOH0.JwD2eSEJI5az08nOGxcUXGtrKpvHIuau0Z5ntzDGi1Q';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myName = "";
    let lastWhisperTarget = null;

    async function login() {
      const id = document.getElementById('login-id').value.trim();
      const pw = document.getElementById('login-pw').value.trim();

      if (!id || !pw) return alert('아이디와 비밀번호를 입력하세요.');

      const { data, error } = await supabaseClient
        .from('users')
        .select('*')
        .eq('username', id)
        .eq('password', pw)
        .maybeSingle();

      if (error) {
        alert('로그인 처리 중 에러 발생: ' + error.message);
        return;
      }

      if (data) {
        myName = data.username;
        document.getElementById('login-sec').style.display = 'none';
        document.getElementById('chat-sec').style.display = 'block';
        document.getElementById('my-name').innerText = myName;

        loadNotice();
        loadMessages();
        subscribeRealtime();
      } else {
        alert('로그인 실패: 아이디 또는 비밀번호가 틀렸습니다.');
      }
    }

    // 채팅창에 텍스트 + 이미지 함께 출력하는 로직
    function appendLogHtml(tagText, senderText, contentText) {
      const box = document.getElementById('chat-box');
      const line = document.createElement('div');
      
      // 이미지 URL 파싱 (확장자 + 쿼리스트링 지원)
      const imgRegex = /(https?:\/\/[^\s]+?\.(?:jpg|jpeg|png|gif|webp)(?:\?[^\s]*)?)/gi;
      
      // 텍스트 보안 처리 (HTML 이스케이프)
      let safeContent = contentText
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      // 이미지 URL이 포함되어 있으면 투박한 <img> 태그로 변환
      if (imgRegex.test(contentText)) {
        safeContent = safeContent.replace(imgRegex, (url) => {
          return `<br><img src="${url}" style="max-width: 250px; max-height: 250px; border: 1px solid black; margin: 3px 0;" /><br>`;
        });
      }

      line.innerHTML = `<b>${tagText} ${senderText}:</b> ${safeContent}`;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight; // 자동 스크롤
    }

    async function loadNotice() {
      const { data } = await supabaseClient.from('notices').select('content').eq('id', 1).maybeSingle();
      if (data) document.getElementById('notice-text').innerText = data.content;
    }

    async function loadMessages() {
      const { data } = await supabaseClient.from('messages').select('*').order('id', { ascending: true }).limit(50);
      if (data) data.forEach(parseAndDisplayMsg);
    }

    function parseAndDisplayMsg(msg) {
      if (msg.channel === 'whisper') {
        if (msg.sender !== myName && msg.receiver !== myName) return;
        const tag = msg.sender === myName ? `[To ${msg.receiver}]` : `[From ${msg.sender}]`;
        appendLogHtml(tag, msg.sender, msg.content);
        return;
      }

      const channelTag = msg.channel === 'global' ? '[전체]' : `[${msg.channel.toUpperCase()}]`;
      appendLogHtml(channelTag, msg.sender, msg.content);
    }

    async function sendMsg() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      const currentChannel = document.getElementById('channel-select').value;

      if (!text) return;

      const noticeMatch = text.match(/^\/공지\s+(.+)/);
      if (noticeMatch) {
        const newNotice = noticeMatch[1];
        await supabaseClient.from('notices').update({ content: newNotice }).eq('id', 1);
        input.value = '';
        return;
      }

      const whisperMatch = text.match(/^\/(?:w|귓)\s+([^\s]+)\s+(.+)/);
      if (whisperMatch) {
        const target = whisperMatch[1];
        const content = whisperMatch[2];

        await supabaseClient.from('messages').insert([{
          sender: myName,
          channel: 'whisper',
          receiver: target,
          content: content
        }]);

        lastWhisperTarget = target;
        input.value = `/w ${lastWhisperTarget} `;
        return;
      }

      await supabaseClient.from('messages').insert([{
        sender: myName,
        channel: currentChannel,
        content: text
      }]);

      lastWhisperTarget = null;
      input.value = '';
    }

    function subscribeRealtime() {
      supabaseClient.channel('public:messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
          parseAndDisplayMsg(payload.new);
        })
        .subscribe();

      supabaseClient.channel('public:notices')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'notices' }, payload => {
          document.getElementById('notice-text').innerText = payload.new.content;
          
          const box = document.getElementById('chat-box');
          const noticeLine = document.createElement('div');
          noticeLine.innerHTML = `<b>[SYSTEM]:</b> 공지가 변경되었습니다.`;
          box.appendChild(noticeLine);
          box.scrollTop = box.scrollHeight;
        })
        .subscribe();
    }
  </script>
</body>
</html>
